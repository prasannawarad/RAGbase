  />

  <g filter="url(#soft)">
    <rect
      x="70"
      y="72"
      width="116"
      height="116"
      rx="28"
      fill="rgba(255,255,255,0.05)"
      stroke="rgba(255,255,255,0.10)"
    />
    <rect
      x="84"
      y="86"
      width="88"
      height="88"
      rx="22"
      fill="rgba(255,255,255,0.02)"
      stroke="rgba(255,255,255,0.08)"
    />

    <path
      d="M104 156V100H138C154 100 164 109 164 122C164 135 154 144 138 144H118L164 156"
      fill="none"
      stroke="url(#ink)"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
